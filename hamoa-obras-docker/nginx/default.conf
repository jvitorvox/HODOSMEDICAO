# ── HAMOA OBRAS — Nginx Virtual Host ──────────────────────────────────────────

# Redireciona HTTP → HTTPS (descomente em produção com SSL)
# server {
#     listen 80;
#     server_name hamoa.sua-empresa.com.br;
#     return 301 https://$host$request_uri;
# }

server {
    listen 80;
    # listen 443 ssl http2;           # descomente para HTTPS
    server_name localhost hamoa.sua-empresa.com.br;

    root /usr/share/nginx/html;
    index index.html;

    # ── SSL (descomente e configure para produção) ──────────────────────────
    # ssl_certificate     /etc/nginx/ssl/hamoa.crt;
    # ssl_certificate_key /etc/nginx/ssl/hamoa.key;
    # ssl_protocols       TLSv1.2 TLSv1.3;
    # ssl_ciphers         HIGH:!aNULL:!MD5;
    # ssl_session_cache   shared:SSL:10m;
    # ssl_session_timeout 10m;

    # ── Headers de segurança ────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"    always;
    add_header X-Content-Type-Options    "nosniff"       always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always; # só com HTTPS

    # ── Arquivo HTML principal (SPA) ────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ── Assets estáticos com cache longo ───────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Proxy para a API ───────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://hamoa-api:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;

        # CORS para a API
        add_header Access-Control-Allow-Origin  "$http_origin" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;
        if ($request_method = OPTIONS) { return 204; }
    }

    # ── Health check ───────────────────────────────────────────────────────
    location /health {
        return 200 '{"status":"ok","service":"hamoa-obras"}';
        add_header Content-Type application/json;
    }

    # ── Bloquear acesso a arquivos sensíveis ───────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Logs ───────────────────────────────────────────────────────────────
    access_log /var/log/nginx/hamoa-access.log;
    error_log  /var/log/nginx/hamoa-error.log;
}
