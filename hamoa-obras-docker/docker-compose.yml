version: '3.9'

services:

  # --- Frontend CONSTRUTIVO OBRAS (Nginx) ---
  construtivo-web:
    image: nginx:1.25-alpine
    container_name: construtivo-obras-web
    restart: unless-stopped
    ports:
      - "8010:80"
      - "9010:443"
      - "8020:8020"
    volumes:
      - ./app:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      - construtivo-api
    networks:
      - construtivo-net
    labels:
      - "com.construtivo.service=web"
      - "com.construtivo.version=3.0"

  # --- API / Backend (Node.js + Express) ---
  construtivo-api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: construtivo-obras-api
    restart: unless-stopped
    ports:
      - "7010:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: construtivo-db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-construtivo_obras}
      DB_USER: ${DB_USER:-construtivo}
      DB_PASS: ${DB_PASS:-construtivo@2025}
      JWT_SECRET: ${JWT_SECRET:-mude-esta-chave-em-producao}
      JWT_EXPIRES_IN: 8h
      # LDAP/AD
      LDAP_ENABLED: ${LDAP_ENABLED:-false}
      LDAP_URL: ${LDAP_URL:-ldap://dc01.empresa.local:389}
      LDAP_BASE_DN: ${LDAP_BASE_DN:-DC=empresa,DC=local}
      LDAP_DOMAIN: ${LDAP_DOMAIN:-EMPRESA}
      LDAP_BIND_DN: ${LDAP_BIND_DN:-svc-construtivo@empresa.local}
      LDAP_BIND_PASS: ${LDAP_BIND_PASS:-}
      # E-mail
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-CONSTRUTIVO OBRAS <noreply@empresa.com.br>}
      # Assinatura Eletronica
      ASSINATURA_PROVEDOR: ${ASSINATURA_PROVEDOR:-d4sign}
      ASSINATURA_API_KEY: ${ASSINATURA_API_KEY:-}
      ASSINATURA_API_SECRET: ${ASSINATURA_API_SECRET:-}
      # IA - Google Gemini (opcional)
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    # DNS corporativo: permite resolver hostnames do dominio AD
    dns:
      - ${CORP_DNS:-8.8.8.8}
    # Alternativa direta: mapeie hostname -> IP sem depender de DNS
    # extra_hosts:
    #   - "CONSTRUTIVO-SRV-000.construtivo.corp:192.168.x.x"
    volumes:
      - api-uploads:/app/uploads
      - api-logs:/app/logs
    depends_on:
      construtivo-db:
        condition: service_healthy
      construtivo-redis:
        condition: service_healthy
    networks:
      - construtivo-net
    labels:
      - "com.construtivo.service=api"

  # --- Banco de Dados PostgreSQL ---
  construtivo-db:
    image: postgres:16-alpine
    container_name: construtivo-obras-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-construtivo_obras}
      POSTGRES_USER: ${DB_USER:-construtivo}
      POSTGRES_PASSWORD: ${DB_PASS:-construtivo@2025}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-construtivo} -d ${DB_NAME:-construtivo_obras}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - construtivo-net
    labels:
      - "com.construtivo.service=database"

  # --- Cache / Sessoes (Redis) ---
  construtivo-redis:
    image: redis:7-alpine
    container_name: construtivo-obras-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASS:-construtivo-redis@2025} --appendonly yes
    # ports:                   # NAO expor em producao - acesso somente pela rede Docker interna
    #   - "6379:6379"          # descomente APENAS para manutencao local temporaria
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASS:-construtivo-redis@2025}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - construtivo-net
    labels:
      - "com.construtivo.service=cache"

  # --- Evolution API (WhatsApp) ---
  # Ativa somente com: docker compose --profile whatsapp up -d
  # Apos subir: acesse http://localhost:8081 -> conecte seu numero (QR Code)
  construtivo-whatsapp:
    image: atendai/evolution-api:latest
    container_name: construtivo-obras-whatsapp
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      SERVER_URL: ${WA_SERVER_URL:-http://construtivo-whatsapp:8080}
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: ${WA_API_KEY:-construtivo-wa-key-2025}
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "true"
      WEBHOOK_GLOBAL_URL: http://construtivo-api:3000/api/whatsapp/webhook
      WEBHOOK_GLOBAL_ENABLED: "true"
      WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS: "false"
      WEBHOOK_EVENTS_MESSAGES_UPSERT: "true"
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://${DB_USER:-construtivo}:${DB_PASS:-construtivo@2025}@construtivo-db:5432/${DB_NAME:-construtivo_obras}
      DATABASE_CONNECTION_CLIENT_NAME: evolution_api
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://:${REDIS_PASS:-construtivo-redis@2025}@construtivo-redis:6379/1
      LOG_LEVEL: ERROR
    volumes:
      - whatsapp-instances:/evolution/instances
    depends_on:
      construtivo-db:
        condition: service_healthy
      construtivo-redis:
        condition: service_healthy
    networks:
      - construtivo-net
    profiles:
      - whatsapp
    labels:
      - "com.construtivo.service=whatsapp"

  # --- Adminer (gerenciador visual do banco) ---
  construtivo-adminer:
    image: adminer:4-standalone
    container_name: construtivo-obras-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: construtivo-db
      ADMINER_DESIGN: dracula
    depends_on:
      - construtivo-db
    networks:
      - construtivo-net
    profiles:
      - tools
    labels:
      - "com.construtivo.service=adminer"

# --- Volumes ---
volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  api-uploads:
    driver: local
  api-logs:
    driver: local
  nginx-logs:
    driver: local
  whatsapp-instances:
    driver: local

# --- Redes ---
networks:
  construtivo-net:
    driver: bridge
    name: construtivo-obras-network
