version: '3.9'

services:

  # ─── Frontend HAMOA OBRAS (Nginx) ───────────────────────────────────────────
  hamoa-web:
    image: nginx:1.25-alpine
    container_name: hamoa-obras-web
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./app:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      - hamoa-api
    networks:
      - hamoa-net
    labels:
      - "com.hamoa.service=web"
      - "com.hamoa.version=3.0"

  # ─── API / Backend (Node.js + Express) ──────────────────────────────────────
  hamoa-api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: hamoa-obras-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: hamoa-db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-hamoa_obras}
      DB_USER: ${DB_USER:-hamoa}
      DB_PASS: ${DB_PASS:-hamoa@2025}
      JWT_SECRET: ${JWT_SECRET:-mude-esta-chave-em-producao}
      JWT_EXPIRES_IN: 8h
      # LDAP/AD
      LDAP_ENABLED: ${LDAP_ENABLED:-false}
      LDAP_URL: ${LDAP_URL:-ldap://dc01.empresa.local:389}
      LDAP_BASE_DN: ${LDAP_BASE_DN:-DC=empresa,DC=local}
      LDAP_DOMAIN: ${LDAP_DOMAIN:-EMPRESA}
      LDAP_BIND_DN: ${LDAP_BIND_DN:-svc-hamoa@empresa.local}
      LDAP_BIND_PASS: ${LDAP_BIND_PASS:-}
      # E-mail
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-HAMOA OBRAS <noreply@empresa.com.br>}
      # Assinatura Eletrônica
      ASSINATURA_PROVEDOR: ${ASSINATURA_PROVEDOR:-d4sign}
      ASSINATURA_API_KEY: ${ASSINATURA_API_KEY:-}
      ASSINATURA_API_SECRET: ${ASSINATURA_API_SECRET:-}
    volumes:
      - api-uploads:/app/uploads
      - api-logs:/app/logs
    depends_on:
      hamoa-db:
        condition: service_healthy
      hamoa-redis:
        condition: service_healthy
    networks:
      - hamoa-net
    labels:
      - "com.hamoa.service=api"

  # ─── Banco de Dados PostgreSQL ───────────────────────────────────────────────
  hamoa-db:
    image: postgres:16-alpine
    container_name: hamoa-obras-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-hamoa_obras}
      POSTGRES_USER: ${DB_USER:-hamoa}
      POSTGRES_PASSWORD: ${DB_PASS:-hamoa@2025}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"          # remova em produção se não precisar de acesso externo
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-hamoa} -d ${DB_NAME:-hamoa_obras}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hamoa-net
    labels:
      - "com.hamoa.service=database"

  # ─── Cache / Sessões (Redis) ─────────────────────────────────────────────────
  hamoa-redis:
    image: redis:7-alpine
    container_name: hamoa-obras-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASS:-hamoa-redis@2025} --appendonly yes
    ports:
      - "6379:6379"          # remova em produção
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASS:-hamoa-redis@2025}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - hamoa-net
    labels:
      - "com.hamoa.service=cache"

  # ─── Adminer (gerenciador visual do banco) ───────────────────────────────────
  hamoa-adminer:
    image: adminer:4-standalone
    container_name: hamoa-obras-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: hamoa-db
      ADMINER_DESIGN: dracula
    depends_on:
      - hamoa-db
    networks:
      - hamoa-net
    profiles:
      - tools                # só sobe com: docker compose --profile tools up
    labels:
      - "com.hamoa.service=adminer"

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  api-uploads:
    driver: local
  api-logs:
    driver: local
  nginx-logs:
    driver: local

# ─── Redes ────────────────────────────────────────────────────────────────────
networks:
  hamoa-net:
    driver: bridge
    name: hamoa-obras-network
